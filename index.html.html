<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>제천 시내버스 전체 노선도</title>
<style>
:root{--ink:#1b2230;--panel:#232a3a;--line:#3a445c;--text:#e8ecf4;--muted:#93a0b8;--accent:#ffd94a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;overflow:hidden;overscroll-behavior:none}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff}

/* 상단바 */
#topbar{height:52px;background:var(--ink);color:var(--text);display:flex;align-items:center;gap:10px;padding:0 12px;z-index:30;flex-shrink:0}
#btnMenu{width:38px;height:38px;border:none;background:var(--panel);color:var(--text);border-radius:9px;font-size:17px;cursor:pointer}
#tbTitle{flex:1;font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tbTitle .sub{font-size:10.5px;color:var(--muted);font-weight:500}
.tbBtn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;font-size:12px;padding:8px 12px;cursor:pointer;white-space:nowrap}
.tbBtn.on{background:var(--accent);color:#1b2230;border-color:var(--accent);font-weight:800}

/* 드로어(노선 목록) */
#drawer{position:fixed;top:52px;left:0;bottom:0;width:min(320px,86vw);background:var(--ink);color:var(--text);z-index:25;display:flex;flex-direction:column;transform:translateX(-105%);transition:transform .28s cubic-bezier(.2,.8,.25,1);box-shadow:4px 0 24px rgba(0,0,0,.35)}
#drawer.open{transform:translateX(0)}
#scrim{position:fixed;inset:52px 0 0 0;background:rgba(10,14,22,.45);z-index:20;opacity:0;pointer-events:none;transition:opacity .25s}
#scrim.on{opacity:1;pointer-events:auto}
#searchbox{padding:12px 14px;border-bottom:1px solid var(--line)}
#search{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:14px;outline:none}
#groups{flex:1;overflow-y:auto;padding:8px 0 30px}
.group{margin:4px 10px 10px}
.ghead{display:flex;align-items:center;gap:8px;padding:8px 8px 6px}
.gdot{width:10px;height:10px;border-radius:3px}
.ghead h2{font-size:12.5px;font-weight:700;flex:1}
.ghead .gcnt{font-size:11px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:7px;padding:2px 8px}
.chip{padding:6px 12px;border-radius:15px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;color:#fff;font-variant-numeric:tabular-nums}
.chip.sel{border-color:var(--accent)}
.chip.hidden{display:none}

/* 본문 */
#stage{flex:1;position:relative;overflow:hidden;background:#fff}
#netWrap,#lineWrap{position:absolute;inset:0}
#netWrap{background:#eef0f3;z-index:0}
#stage{z-index:0}
#btnBase{position:absolute;bottom:12px;left:12px;z-index:14;border:1px solid #c6cdd8;background:rgba(255,255,255,.95);color:#334155;font-size:11.5px;font-weight:700;padding:8px 12px;border-radius:9px;cursor:pointer;box-shadow:0 2px 8px rgba(20,28,45,.15)}
.leaflet-container{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif}
#lineWrap{overflow:auto;background:#fff;display:none;-webkit-overflow-scrolling:touch}
.mode-line #netWrap{display:none}
.mode-line #lineWrap{display:block}

/* 하단 정보바 */
#infobar{position:absolute;left:10px;right:10px;bottom:10px;background:rgba(27,34,48,.95);color:#fff;border-radius:13px;padding:11px 14px;display:none;align-items:center;gap:11px;z-index:15;box-shadow:0 4px 18px rgba(0,0,0,.3)}
#infobar.on{display:flex}
#ibBadge{min-width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;padding:0 6px}
#ibTxt{flex:1;min-width:0}
#ibTxt .a{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ibTxt .b{font-size:11px;color:#a7b1c5}
#ibGo{border:none;background:var(--accent);color:#1b2230;font-weight:800;font-size:12px;padding:9px 13px;border-radius:9px;cursor:pointer;white-space:nowrap}
#ibX{border:none;background:rgba(255,255,255,.15);color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer}

#hint{position:absolute;top:10px;left:10px;z-index:14;background:rgba(27,34,48,.82);color:#dfe6f2;font-size:11px;padding:7px 11px;border-radius:9px;max-width:75vw;line-height:1.5}
#stopsheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -6px 26px rgba(20,28,45,.25);z-index:18;transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.25,1);max-height:55%;display:flex;flex-direction:column}
#stopsheet.on{transform:translateY(0)}
#ssBar{width:56px;height:6px;border-radius:3px;background:#c8cfda;margin:0 auto;flex-shrink:0}
#ssBarWrap{padding:12px 0 8px;flex-shrink:0;touch-action:none;cursor:grab}
#ssHead{padding:6px 18px 10px;border-bottom:1px solid #eef1f5}
#ssName{font-size:16px;font-weight:800;color:#1b2230}
#ssMeta{font-size:11.5px;color:#8a94a6;margin-top:2px}
#ssChips{overflow-y:auto;display:block;padding:0}
#ssChips .chip{font-size:13px}
#ssChips .cur{outline:2px solid var(--accent);outline-offset:1px}
svg text{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif}
</style>
<style id="leafletcss">/* Leaflet 1.9.4 내장 */

/* zoom and fade animations */

</script>
<script>
const D=JSON.parse(document.getElementById('DATA').textContent);
const stops=D.stops,extraNames=D.extraNames,routes=D.routes,transfers=D.transfers;
const REG=D.reg||{},REGMETA=D.regMeta||[],TURNS=D.turns||{};
const nameOf=id=>stops[id]?stops[id][2]:(extraNames[id]||id);

/* ── 노선 그룹 (방면별) ── */
const DUKSAN=new Set(['971','974','981','983','984']);
const GROUPS=[
 {name:'통학노선',sub:'1~7번대',hue:358,test:rn=>rn.includes('-')},
 {name:'시내',sub:'21~79번',hue:214,test:rn=>+rn<100},
 {name:'단양 방면',sub:'100번대',hue:150,test:rn=>+rn<200},
 {name:'송학·어상천·구인사 방면',sub:'200번대',hue:96,test:rn=>+rn<300},
 {name:'주천 방면',sub:'300번대',hue:268,test:rn=>+rn<400},
 {name:'봉양 방면',sub:'400번대',hue:28,test:rn=>+rn<500},
 {name:'송학·한반도면 방면',sub:'500번대',hue:186,test:rn=>+rn<600},
 {name:'두학·한천·어상천 방면',sub:'600번대',hue:62,test:rn=>+rn<700},
 {name:'백운 방면',sub:'800번대',hue:305,test:rn=>+rn<900},
 {name:'덕산·한수 순환',sub:'971·974·981·983·984',hue:20,test:rn=>DUKSAN.has(rn)},
 {name:'금성·수산 방면',sub:'900번대',hue:328,test:rn=>true}];
function groupOf(rn){for(const g of GROUPS){if(g.test(rn))return g;}}
const grouped={};GROUPS.forEach(g=>grouped[g.name]=[]);
const numKey=rn=>{const[a,b]=rn.split('-');return(+a)*1000+(b?+b:0);};
Object.keys(routes).sort((a,b)=>numKey(a)-numKey(b)).forEach(rn=>grouped[groupOf(rn).name].push(rn));
const routeColor={};
GROUPS.forEach(g=>{const l=grouped[g.name];l.forEach((rn,i)=>{
 const t=l.length>1?i/(l.length-1):.5;
 routeColor[rn]=`hsl(${g.hue+(t-.5)*36},68%,${38+(i%3)*8}%)`;});});

/* ── 요일 정규화 + 운행계통 통합 모델 ── */
const DAY_ORDER=['평일','장날','토','일','기타'];
function normDay(d){d=String(d);if(d.startsWith('평일'))return'평일';if(d.startsWith('장날'))return'장날';if(d.startsWith('토'))return'토';if(d.startsWith('일'))return'일';return'기타';}
const CIRC='①②③④⑤⑥⑦⑧⑨⑩';
const PATC=['#1b2230','#c2410c','#0e7490','#7c3aed','#be185d','#4d7c0f','#b45309','#075985','#9f1239','#334155'];
function mergeLCS(A,B,k){
 const n=A.length,m=B.length,W=m+1;
 const dp=new Int32Array((n+1)*W);
 for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--)
  dp[i*W+j]=A[i].id===B[j]?dp[(i+1)*W+j+1]+1:Math.max(dp[(i+1)*W+j],dp[i*W+j+1]);
 const out=[];let i=0,j=0;
 while(i<n&&j<m){
  if(A[i].id===B[j]){A[i].idx[k]=j;out.push(A[i]);i++;j++;}
  else if(dp[(i+1)*W+j]>=dp[i*W+j+1]){out.push(A[i]);i++;}
  else{const o={id:B[j],idx:{}};o.idx[k]=j;out.push(o);j++;}

 while(i<n){out.push(A[i]);i++;}
 while(j<m){const o={id:B[j],idx:{}};o.idx[k]=j;out.push(o);j++;}
 return out;
}
const _models={};
function model(rn){
 if(_models[rn])return _models[rn];
 const pats=routes[rn];
 let union=pats[0].ids.map((id,i)=>{const o={id,idx:{}};o.idx[0]=i;return o;});
 for(let k=1;k<pats.length;k++)union=mergeLCS(union,pats[k].ids,k);
 union.forEach(u=>{u.served=Object.keys(u.idx).map(Number);});
 let trips=[];
 pats.forEach((p,pi)=>p.trips.forEach(t=>{
  const dep=t.t.find(x=>x!=null);
  trips.push({pi,d:normDay(t.d),t:t.t,dep});
 }));
 /* 요일 중복 제거: 같은 계통에서 평일과 출발시각이 겹치면 평일에만 표기 */
 const wk={};trips.forEach(t=>{if(t.d==='평일'&&t.dep!=null)(wk[t.pi]=wk[t.pi]||new Set()).add(t.dep);});
 trips=trips.filter(t=>t.d==='평일'||t.dep==null||!(wk[t.pi]&&wk[t.pi].has(t.dep)));
 const days=DAY_ORDER.filter(d=>trips.some(t=>t.d===d));
 const m={pats,union,trips,days};_models[rn]=m;return m;
}

/* ── 드로어 ── */
const drawer=document.getElementById('drawer'),scrim=document.getElementById('scrim');
function openDrawer(v){drawer.classList.toggle('open',v);scrim.classList.toggle('on',v);}
document.getElementById('btnMenu').onclick=()=>openDrawer(!drawer.classList.contains('open'));
scrim.onclick=()=>openDrawer(false);
(function(){
 let sx=null,sy=null,dx=0,horiz=null;
 drawer.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;horiz=null;},{passive:true});
 drawer.addEventListener('touchmove',e=>{
  if(sx==null)return;
  const x=e.touches[0].clientX,y=e.touches[0].clientY;
  if(horiz==null)horiz=Math.abs(x-sx)>Math.abs(y-sy)+4;
  if(!horiz)return;
  dx=Math.min(0,x-sx);
  drawer.style.transition='none';drawer.style.transform=`translateX(${dx}px)`;
  if(e.cancelable)e.preventDefault();
 },{passive:false});
 drawer.addEventListener('touchend',()=>{
  drawer.style.transition='';drawer.style.transform='';
  if(horiz&&dx<-70)openDrawer(false);
  sx=null;horiz=null;dx=0;
 });
})();

const gWrap=document.getElementById('groups');
GROUPS.forEach(g=>{const l=grouped[g.name];if(!l.length)return;
 const div=document.createElement('div');div.className='group';
 div.innerHTML=`<div class="ghead"><span class="gdot" style="background:hsl(${g.hue},68%,50%)"></span><h2>${g.name} <span style="font-weight:500;color:#93a0b8;font-size:11px">${g.sub}</span></h2><span class="gcnt">${l.length}</span></div>
 <div class="chips">${l.map(rn=>`<span class="chip" data-rn="${rn}" style="background:${routeColor[rn]}">${rn}</span>`).join('')}</div>`;
 gWrap.appendChild(div);});
document.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{select(el.dataset.rn);openDrawer(false);setMode('line');});

document.getElementById('search').addEventListener('input',e=>{
 const q=e.target.value.trim(),chips=document.querySelectorAll('#groups .chip');
 if(!q){chips.forEach(c=>c.classList.remove('hidden'));return;}
 const m=new Set();
 for(const rn in routes){
  if(rn.includes(q)){m.add(rn);continue;}
  if(routes[rn].some(p=>p.ids.some(id=>nameOf(id).includes(q))))m.add(rn);
 }
 chips.forEach(c=>c.classList.toggle('hidden',!m.has(c.dataset.rn)));
});

/* ── 전체 노선도: 제천시 실제 지도(Leaflet) 위에 노선 표시 ── */
const netWrap=document.getElementById('netWrap');
let netSel=null;
const map=L.map('netWrap',{preferCanvas:true,zoomControl:false,attributionControl:true});
L.control.zoom({position:'bottomright'}).addTo(map);
const BASEMAPS=[
 {n:'밝은 지도',u:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',a:'&copy; OpenStreetMap &copy; CARTO'},
 {n:'OSM 기본',u:'https://tile.openstreetmap.org/{z}/{x}/{y}.png',a:'&copy; OpenStreetMap contributors'},
 {n:'위성사진',u:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',a:'&copy; Esri'}];
let baseIdx=0,baseLayer=L.tileLayer(BASEMAPS[0].u,{maxZoom:19,attribution:BASEMAPS[0].a}).addTo(map);
document.getElementById('btnBase').onclick=()=>{
 baseIdx=(baseIdx+1)%BASEMAPS.length;map.removeLayer(baseLayer);
 baseLayer=L.tileLayer(BASEMAPS[baseIdx].u,{maxZoom:19,attribution:BASEMAPS[baseIdx].a}).addTo(map);
 document.getElementById('btnBase').textContent='🗺 '+BASEMAPS[baseIdx].n;
};
// 전체 범위
let allB=null;
for(const id in stops){const p=[stops[id][0],stops[id][1]];allB=allB?allB.extend(p):L.latLngBounds(p,p);}
map.fitBounds(allB,{padding:[20,20]});
// 노선 폴리라인
const routeLayers={},routeBounds={};
for(const rn in routes){
 const grp=L.layerGroup();let rb=null;
 routes[rn].forEach(pat=>{
  const ll=pat.ids.map(id=>stops[id]).filter(Boolean).map(s=>[s[0],s[1]]);
  if(ll.length<2)return;
  const pl=L.polyline(ll,{color:routeColor[rn],weight:3,opacity:.72});
  pl.on('click',e=>{L.DomEvent.stopPropagation(e);select(rn);});
  pl.addTo(grp);
  rb=rb?rb.extend(pl.getBounds()):pl.getBounds();
 });
 grp.addTo(map);routeLayers[rn]=grp;routeBounds[rn]=rb;
}
let selStopLayer=L.layerGroup().addTo(map);
function styleNet(){
 for(const rn in routeLayers){
  const sel=rn===netSel,dim=netSel&&!sel;
  routeLayers[rn].eachLayer(pl=>{
   pl.setStyle({weight:sel?6:3,opacity:sel?1:(dim?.10:.72)});
   if(sel&&pl.bringToFront)pl.bringToFront();
  });
 }
 selStopLayer.clearLayers();
 if(netSel){
  const mm=model(netSel);
  mm.union.forEach((u,i)=>{
   const s=stops[u.id];if(!s)return;
   const end=i===0||i===mm.union.length-1;
   L.circleMarker([s[0],s[1]],{radius:end?7:4.5,color:end?'#1b2230':routeColor[netSel],weight:end?3:2,fillColor:'#fff',fillOpacity:1})
    .on('click',e=>{L.DomEvent.stopPropagation(e);openStopSheet(u.id,i);})
    .bindTooltip(nameOf(u.id),{direction:'top',offset:[0,-6]})
    .addTo(selStopLayer);
  });
 }
}
map.on('click',()=>{});

/* ── 노선별 통합 다이어그램 ── */
const lineWrap=document.getElementById('lineWrap');
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function fmt(m){return m==null?'':String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function patLabel(rn,i){
 const pats=routes[rn],ids=pats[i].ids;
 let lab=`${nameOf(ids[0])} → ${nameOf(ids[ids.length-1])}`;
 const dup=pats.filter((p,j)=>j!==i&&nameOf(p.ids[0])===nameOf(ids[0])&&nameOf(p.ids[p.ids.length-1])===nameOf(ids[ids.length-1]));
 if(dup.length){
  const mid=nameOf(ids[Math.floor(ids.length/2)]);

})();
document.getElementById('stage').addEventListener('click',e=>{
 if(!e.target.closest('#stopsheet')&&!e.target.closest('.stopg')&&!e.target.closest('.stoptap')&&!e.target.closest('.leaflet-interactive'))sheet.classList.remove('on');
});

/* ── 선택/모드 ── */
const infobar=document.getElementById('infobar');
function select(rn){
 netSel=rn;curTrip=0;
 document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('sel',c.dataset.rn===rn));
 const mm=model(rn);
 document.getElementById('ibBadge').style.background=routeColor[rn];
 document.getElementById('ibBadge').textContent=rn;
 const seg=mm.pats[0].ids;
 infobar.querySelector('.a').textContent=`${nameOf(seg[0])} → ${nameOf(seg[seg.length-1])}`;
 infobar.querySelector('.b').textContent=`정류장 ${mm.union.length}개 · 운행계통 ${mm.pats.length}개`;
 infobar.classList.add('on');
 document.getElementById('tbSub').textContent=`${rn}번 선택됨`;
 styleNet();
 if(routeBounds[rn])map.fitBounds(routeBounds[rn],{padding:[30,30]});
 renderLine();
 if(!document.getElementById('app').classList.contains('mode-line'))infobar.style.display='flex';
}
document.getElementById('ibGo').onclick=()=>setMode('line');
document.getElementById('ibX').onclick=()=>{netSel=null;infobar.classList.remove('on');
 document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
 document.getElementById('tbSub').textContent=`노선 ${Object.keys(routes).length}개`;
 styleNet();map.fitBounds(allB,{padding:[20,20]});};

function setMode(m){
 sheet.classList.remove('on');
 document.getElementById('app').classList.toggle('mode-line',m==='line');
 document.getElementById('btnNet').classList.toggle('on',m==='net');
 document.getElementById('btnLine').classList.toggle('on',m==='line');
 document.getElementById('hint').style.display=(m==='net')?'block':'none';
 document.getElementById('btnBase').style.display=(m==='net')?'block':'none';
 infobar.style.display=(m==='net'&&netSel)?'flex':'none';
 if(m==='net')setTimeout(()=>map.invalidateSize(),60);
 if(m==='line')renderLine();
}
document.getElementById('btnNet').onclick=()=>setMode('net');
document.getElementById('btnLine').onclick=()=>setMode('line');
window.addEventListener('resize',()=>{if(document.getElementById('app').classList.contains('mode-line'))renderLine();else map.invalidateSize();});

styleNet();
document.getElementById('tbSub').textContent=`노선 ${Object.keys(routes).length}개`;

</script>
</body>
</html>
